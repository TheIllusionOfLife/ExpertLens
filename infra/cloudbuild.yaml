steps:
  # Build backend image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/expertlens/backend:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/expertlens/backend:latest"
      - "-f"
      - "Dockerfile"
      - "."
    id: build-backend

  # Build frontend image
  # REQUIRES: _BACKEND_URL substitution set in the Cloud Build trigger
  # (e.g. https://expertlens-backend-xxx-uc.a.run.app).
  # NEXT_PUBLIC_* vars are inlined at build time and cannot be set via Cloud Run env vars.
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_BACKEND_URL}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/expertlens/frontend:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/expertlens/frontend:latest"
      - "-f"
      - "app/web/Dockerfile"
      - "app/web"
    id: build-frontend

  # Push backend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/expertlens/backend"
    waitFor: ["build-backend"]
    id: push-backend

  # Push frontend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/expertlens/frontend"
    waitFor: ["build-frontend"]
    id: push-frontend

  # Deploy backend to Cloud Run (update image only — Terraform manages all other config)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - expertlens-backend
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/expertlens/backend:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--quiet"
    waitFor: ["push-backend"]
    id: deploy-backend

  # Deploy frontend to Cloud Run (update image only — Terraform manages all other config)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - expertlens-frontend
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/expertlens/frontend:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--quiet"
    waitFor: ["push-frontend"]
    id: deploy-frontend

  # Persist CORS origins on every deploy so the env var can never drift from Terraform defaults.
  # Terraform manages cloud_run.tf with ignore_changes on env, so this step is the source of truth.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - expertlens-backend
      - "--update-env-vars=^#^CORS_ORIGINS=${_CORS_ORIGINS}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--quiet"
    waitFor: ["deploy-backend"]
    id: set-cors

substitutions:
  _REGION: us-central1
  # Set _BACKEND_URL in the Cloud Build trigger to the deployed backend Cloud Run URL.
  # Cloud Build is the CI/CD path for iterative image updates after initial provisioning
  # via deploy.sh. deploy.sh must be run first to provision Terraform infra and wire URLs.
  _BACKEND_URL: ""
  # Override _CORS_ORIGINS in the Cloud Build trigger with the actual frontend URL.
  # Empty default prevents accidental deploys with wrong origins if trigger override is missing.
  _CORS_ORIGINS: ""

options:
  logging: CLOUD_LOGGING_ONLY
